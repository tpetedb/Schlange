# Video Specification — SMUTZIGE HANSIE presenteert den laatste party
# 9 scenes, character reference images, background music
# Canonical event date: Thursday, 12 March 2026

meta:
  title: "SMUTZIGE HANSIE PRESENTEERT DEN LAATSTE PARTY"
  duration_target: "50-60 seconds"
  language: "German (primary)"
  tone: "Bombastic, absurd, over-engineered chaos"
  format: "MP4 1080p"

reference_assets:
  video: "data/smutzige_hansie_video.mp4"
  asset_dir: "data/"
  character_images:
    - "data/smutzigehansie-reference-image-1.png"
    - "data/smutzigehansie-reference-image-2.png"
    - "data/smutzigehansie-reference-image-3.png"

background_music:
  file: "data/DJ Dreckisch - Barbieboy (feat. Ennoia) [Extended Mix].wav"
  note: "Overlaid during ffmpeg stitch step (replaces Veo-generated audio)"

event:
  date_iso: "2026-03-12"
  date_de: "Donnerstag, 12. März 2026"
  date_en: "Thursday, 12 March 2026"
  date_nl: "Donderdag 12 maart 2026"
  location: "YoungOnes Office"

mandatory_content:
  cow_line_de: "Die KI hat entschieden: Wir mieten eine riesige aufblasbare Kuh, aus der man Bier melken kann."
  cow_line_en: "The AI has decided: We're renting a giant inflatable cow that dispenses beer."
  cow_line_nl: "De AI heeft besloten: We huren een gigantische opblaasbare koe waar je bier uit kunt melken."
  closing_de: "Sei dabei -- oder sei ein Viereck."
  closing_en: "Be there -- or be square."
  closing_nl: "Wees erbij -- of wees een vierkant."

scenes:
  - id: "nuclear_intro"
    duration: 4
    type: "title_card"
    prompt: >
      Nuclear explosion opening. Black screen, then massive mushroom cloud.
      Title text slams in: "SMUTZIGE HANSIE PRESENTEERT".
      Subtitle: "DEN LAATSTE PARTY".
      Radiation symbols, fire particles, screen shake, impact sound.
    subtitle: "SMUTZIGE HANSIE PRESENTEERT"
    narration: ""
    character_refs: false
    validation:
      - "SMUTZIGE HANSIE"

  - id: "chaos_montage"
    duration: 8
    type: "montage"
    prompt: >
      Rapid-fire montage of chaotic coding moments. Explosions, terminal
      text flying across screen, Schlange keywords visible: importiert,
      probiert, gibzurueck, als. Fast cuts. Matrix rain of German keywords.
      A man in a hoodie typing aggressively at a laptop.
    subtitle: "PROBIERT * AUSSER * ENDLICH"
    narration: >
      Smutzige Hansi hat nicht einfach gekuendigt.
      Smutzige Hansi hat eine Programmiersprache gebaut.
      Und damit ein chaotisches Abschiedsprogramm gestartet.
    character_refs: true
    validation:
      - "Programmiersprache"
      - "chaotisches Abschiedsprogramm"

  - id: "coding_cat_energy"
    duration: 6
    type: "montage"
    prompt: >
      Meme-cat chaotic coding energy. A man typing at a laptop like a
      caffeinated cat. Terminal commands flying. Overdramatic zooms.
      Green text on black screens. Hacker aesthetic. RGB keyboard flashing.
    subtitle: "CODING CAT ENERGY"
    narration: >
      Smutzige Hansi tippt wie eine Katze auf Speed.
      Terminal-Befehle fliegen durch die Luft.
      Deutsche Keywords ueberall.
    character_refs: true
    validation:
      - "Katze"
      - "Terminal"

  - id: "schlange_reveal"
    duration: 6
    type: "reveal"
    prompt: >
      Screen shows Schlange code transforming into Python.
      Split screen: German keywords on left, Python on right.
      verkuendet becomes print. defn becomes def.
      Dramatic reveal: "SCHLANGE -- Python auf Deutsch"
    subtitle: "SCHLANGE -- Python auf Deutsch"
    narration: >
      Schlange -- ein deutscher Python-Interpreter-Wrapper.
      Weil normale Programmierung zu langweilig war.
    character_refs: false
    validation:
      - "Schlange"
      - "Python"

  - id: "tom2000_reveal"
    duration: 6
    type: "reveal"
    prompt: >
      Spotify playlist "Tom 2000" appears on screen.
      2000 tracks scroll past dramatically.
      Play counts and hours displayed.
      Music visualization in background. Neon glow.
    subtitle: "TOM 2000 -- 2000 Tracks. 5706 Stunden."
    narration: >
      Tom 1000? Zu wenig.
      Tom 2000 -- featuring Schlange.
      Automatisch generiert aus 6 Jahren Spotify-Geschichte.
    character_refs: false
    validation:
      - "Tom 2000"
      - "Schlange"

  - id: "ai_surprise"
    duration: 6
    type: "announcement"
    prompt: >
      Giant inflatable beer cow appears on screen.
      Dramatic zoom. Confetti explosion.
      Beer taps attached to cow udders.
      Everyone looks shocked and delighted. Party atmosphere.
    subtitle: "Die KI hat entschieden..."
    narration: >
      Die KI hat entschieden: Wir mieten eine riesige aufblasbare Kuh,
      aus der man Bier melken kann.
    character_refs: false
    validation:
      - "aufblasbare Kuh"
      - "Bier melken"

  - id: "oktoberfest_madness"
    duration: 6
    type: "party"
    prompt: >
      Full Oktoberfest madness. Beer tables, Lederhosen, a man partying
      with colleagues. The inflatable cow is visible in the background.
      Confetti, streamers, people laughing and dancing. Pure chaos.
    subtitle: "OKTOBERFEST MADNESS"
    narration: >
      Biertische, Lederhosen, und eine Kuh.
      So feiert man einen Abschied.
    character_refs: true
    validation:
      - "Lederhosen"
      - "Abschied"

  - id: "final_cta"
    duration: 4
    type: "event_card"
    prompt: >
      Clean event card with bold typography.
      Date: Donnerstag, 12. Maerz 2026
      Location: YoungOnes Office
      Hazard stripes border.
      Countdown timer effect. Urgent red glow.
    subtitle: "Donnerstag, 12. Maerz 2026 -- YoungOnes Office"
    narration: >
      Donnerstag, 12. Maerz 2026.
      YoungOnes Office.
    character_refs: false
    validation:
      - "12. Maerz 2026"
      - "YoungOnes Office"

  - id: "stupid_ending"
    duration: 4
    type: "closing"
    prompt: >
      Final explosion. A man walks away from the camera in slow motion.
      Text appears: "Sei dabei -- oder sei ein Viereck."
      Powered by Schlange logo.
      Fade to black with nuclear glow.
    subtitle: "Sei dabei -- oder sei ein Viereck."
    narration: >
      Sei dabei -- oder sei ein Viereck.
    character_refs: false
    validation:
      - "Sei dabei"
      - "Viereck"

output:
  video: "out/video/final.mp4"
  script: "out/video/script_de.txt"
  subtitles: "out/video/subtitles.srt"
  metadata: "out/video/metadata.json"
  frames:
    - "out/email/img/frame_01.jpg"
    - "out/email/img/frame_02.jpg"
    - "out/email/img/frame_03.jpg"
    - "out/email/img/frame_04.jpg"
